<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Findas – Poll</title>
  <link rel="icon" id="faviconLink" href="https://storage.files-vault.com/images/20260219120306_original__media_177.webp" type="image/webp">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Space+Grotesk:wght@600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f6f8fe;
      --card: rgba(255,255,255,0.98);
      --line: rgba(7,26,52,0.10);
      --text: #071a34;
      --muted: #4d5b78;
      --brand: #4169E1;
      --brand2: #2B66C2;
      --ok: #10b981;
      --bad: #ef4444;
      --warn: #f59e0b;
      --r: 14px;
      --glow: 0 0 0 3px rgba(65,105,225,.22);
      --shadow-sm: 0 2px 8px rgba(7,26,52,.07);
      --shadow-md: 0 6px 24px rgba(7,26,52,.11);
      --shadow-lg: 0 12px 40px rgba(7,26,52,.14);
    }
    *,*::before,*::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; overflow-x: hidden; }
    body { font-family: 'Plus Jakarta Sans','Segoe UI',sans-serif; color: var(--text); background: var(--bg); min-height: 100vh; }
    h1,h2,h3,h4 { font-family: 'Space Grotesk','Plus Jakarta Sans',sans-serif; letter-spacing: -0.02em; }
    a { color: inherit; text-decoration: none; }
    button,input,textarea { font: inherit; }
    img { max-width: 100%; display: block; }

    /* NAVBAR */
    .top { position: fixed; top: 0; left: 0; right: 0; z-index: 100; background: linear-gradient(90deg,#1F4D87 0%,#2563eb 100%); border-bottom: 1px solid rgba(255,255,255,0.1); box-shadow: 0 2px 16px rgba(31,77,135,.25); }
    .topin { max-width: 900px; margin: auto; padding: 10px 20px; display: flex; align-items: center; gap: 14px; min-height: 70px; }
    .brand { display: flex; align-items: center; gap: 12px; font-family: 'Space Grotesk',sans-serif; font-weight: 800; font-size: 1.35rem; letter-spacing: -0.02em; color: #fff; }
    .brand img { height: 46px; width: auto; }
    body { padding-top: 70px; }
    .page-wrap { max-width: 680px; margin: 0 auto; padding: 2.5rem 1.25rem 4rem; }

    /* STATES */
    .state { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 3.5rem 1.5rem; text-align: center; gap: 1rem; }
    .state-icon { font-size: 3rem; line-height: 1; }
    .state-title { font-size: 1.45rem; font-weight: 700; color: var(--text); }
    .state-text { color: var(--muted); font-size: 1rem; max-width: 340px; }
    .state.error .state-title { color: var(--bad); }
    .state.closed .state-title { color: var(--warn); }

    /* POLL CARD */
    .poll-card { background: var(--card); border-radius: var(--r); box-shadow: var(--shadow-md); border: 1px solid var(--line); overflow: hidden; }
    .poll-card-header { padding: 1.75rem 2rem 1.25rem; border-bottom: 1px solid var(--line); }
    .poll-eyebrow { display: flex; align-items: center; gap: 0.5rem; margin-bottom: 0.75rem; }
    .status-badge { display: inline-flex; align-items: center; gap: 0.35rem; padding: 0.2rem 0.65rem; border-radius: 99px; font-size: 0.78rem; font-weight: 700; letter-spacing: 0.03em; text-transform: uppercase; }
    .status-badge.active { background: rgba(16,185,129,0.12); color: #059669; }
    .status-badge.active::before { content:''; width:7px; height:7px; border-radius:50%; background:#10b981; }
    .poll-question { font-size: 1.45rem; font-weight: 700; line-height: 1.3; color: var(--text); margin-bottom: 0.5rem; }
    .poll-meta { display: flex; flex-wrap: wrap; gap: 0.5rem 1.2rem; font-size: 0.85rem; color: var(--muted); }
    .poll-card-body { padding: 1.5rem 2rem; }

    .already-voted-banner { display: flex; align-items: center; gap: 0.75rem; background: rgba(16,185,129,0.08); border: 1px solid rgba(16,185,129,0.2); border-radius: 10px; padding: 0.85rem 1.1rem; margin-bottom: 1.5rem; font-size: 0.92rem; color: #059669; font-weight: 600; }
    .options-list { display: flex; flex-direction: column; gap: 0.65rem; margin-bottom: 1.5rem; }
    .vote-option { display: flex; align-items: center; gap: 0.9rem; padding: 1rem 1.15rem; border: 2px solid var(--line); border-radius: 10px; cursor: pointer; transition: border-color .2s,background .2s,transform .15s,box-shadow .2s; background: #fff; user-select: none; position: relative; overflow: hidden; }
    .vote-option:hover { border-color: var(--brand); background: rgba(65,105,225,0.04); box-shadow: var(--shadow-sm); transform: translateX(4px); }
    .vote-option.selected { border-color: var(--brand); background: rgba(65,105,225,0.07); box-shadow: var(--glow); transform: scale(1.01); }
    .vote-option .radio { width: 20px; height: 20px; flex-shrink: 0; border: 2px solid var(--line); border-radius: 50%; transition: border-color .2s,background .2s; display: flex; align-items: center; justify-content: center; }
    .vote-option.selected .radio { border-color: var(--brand); background: var(--brand); }
    .vote-option.selected .radio::after { content:''; width:7px; height:7px; border-radius:50%; background:#fff; }
    .vote-option .option-text { font-size: 1rem; font-weight: 500; flex: 1; }

    .result-option { margin-bottom: 0.75rem; }
    .result-label-row { display: flex; justify-content: space-between; font-size: 0.92rem; font-weight: 600; margin-bottom: 0.4rem; }
    .result-pct { color: var(--brand); font-weight: 700; }
    .result-bar-wrap { height: 10px; background: rgba(65,105,225,0.1); border-radius: 99px; overflow: hidden; }
    .result-bar-fill { height: 100%; background: linear-gradient(90deg,var(--brand),#60a5fa); border-radius: 99px; transition: width 0.7s cubic-bezier(.4,0,.2,1); }
    .result-bar-fill.winner { background: linear-gradient(90deg,#059669,#34d399); }

    .submit-btn { width: 100%; padding: 0.9rem 1.5rem; background: var(--brand); color: #fff; border: none; border-radius: 10px; font-size: 1.05rem; font-weight: 700; cursor: pointer; transition: background .2s,transform .15s,box-shadow .2s; box-shadow: 0 4px 14px rgba(65,105,225,.35); }
    .submit-btn:hover:not(:disabled) { background: var(--brand2); transform: translateY(-2px); box-shadow: 0 6px 20px rgba(65,105,225,.4); }
    .submit-btn:disabled { background: #c7d2e8; cursor: not-allowed; box-shadow: none; }

    .voters-section { margin-top: 1.5rem; padding-top: 1.5rem; border-top: 1px solid var(--line); }
    .voters-section h3 { font-size: 1rem; font-weight: 700; margin-bottom: 0.85rem; color: var(--brand); }
    .voter-row { display: flex; justify-content: space-between; align-items: center; padding: 0.6rem 0.8rem; border-radius: 8px; margin-bottom: 0.45rem; background: rgba(65,105,225,0.05); font-size: 0.88rem; }
    .voter-name { font-weight: 600; }
    .voter-choice { color: var(--muted); }

    .thank-you { background: linear-gradient(135deg,rgba(16,185,129,0.08),rgba(16,185,129,0.04)); border: 1.5px solid rgba(16,185,129,0.25); border-radius: 12px; padding: 1.5rem; text-align: center; margin-bottom: 1.5rem; }
    .thank-you-icon { font-size: 2.5rem; margin-bottom: 0.5rem; }
    .thank-you h3 { color: #059669; font-size: 1.25rem; margin-bottom: 0.4rem; }
    .thank-you p { color: var(--muted); font-size: 0.92rem; }

    .modal-backdrop { position: fixed; inset: 0; z-index: 999; background: rgba(7,26,52,0.55); backdrop-filter: blur(6px); display: flex; align-items: center; justify-content: center; }
    .modal-backdrop.hidden { display: none; }
    .modal-box { background: #fff; border-radius: var(--r); padding: 2rem; width: 90%; max-width: 440px; box-shadow: var(--shadow-lg); }
    .modal-box h3 { font-size: 1.25rem; margin-bottom: 0.35rem; color: var(--text); }
    .modal-box p { color: var(--muted); font-size: 0.9rem; margin-bottom: 1.25rem; }
    .modal-input { width: 100%; padding: 0.75rem 1rem; border: 2px solid var(--line); border-radius: 8px; font-size: 1rem; outline: none; transition: border-color .2s; }
    .modal-input:focus { border-color: var(--brand); box-shadow: var(--glow); }
    .modal-actions { display: flex; gap: 0.75rem; margin-top: 1.25rem; }
    .modal-actions .submit-btn { flex: 1; padding: 0.75rem; font-size: 0.97rem; }
    .cancel-btn { padding: 0.75rem 1.25rem; background: transparent; border: 2px solid var(--line); border-radius: 8px; font-size: 0.97rem; font-weight: 600; cursor: pointer; color: var(--muted); transition: border-color .2s,color .2s; }
    .cancel-btn:hover { border-color: var(--brand); color: var(--brand); }

    .toast-container { position: fixed; top: 82px; right: 20px; z-index: 9999; }
    .toast { min-width: 280px; padding: 0.85rem 1.25rem; background: #fff; border-radius: 10px; border-left: 4px solid var(--brand); box-shadow: var(--shadow-md); margin-bottom: 0.5rem; font-size: 0.9rem; font-weight: 500; animation: toastSlide 0.3s ease; }
    .toast.success { border-left-color: var(--ok); }
    .toast.error   { border-left-color: var(--bad); }
    .toast.warning { border-left-color: var(--warn); }
    @keyframes toastSlide { from { transform: translateX(120%); opacity: 0; } to { transform: none; opacity: 1; } }

    @keyframes shimmer { from { background-position: -400px 0; } to { background-position: 400px 0; } }
    .skeleton { height: 1em; border-radius: 6px; background: linear-gradient(90deg,#e8edf5 25%,#f2f5fb 50%,#e8edf5 75%); background-size: 800px 100%; animation: shimmer 1.4s infinite; }
    .hidden { display: none !important; }
    @media (max-width: 540px) {
      .poll-card-header,.poll-card-body { padding-left: 1.25rem; padding-right: 1.25rem; }
      .poll-question { font-size: 1.25rem; }
    }
  </style>
</head>
<body>
  <nav class="top">
    <div class="topin">
      <a href="/" class="brand" id="navBrand">
        <img id="navLogo" src="" alt="Findas" hidden>
        <span id="brandNameText">Findas</span>
      </a>
    </div>
  </nav>

  <div class="toast-container" id="toastContainer"></div>

  <main class="page-wrap">
    <div id="loadingState">
      <div class="poll-card" style="padding:2rem">
        <div class="skeleton" style="width:55%;height:1.4rem;margin-bottom:1.25rem"></div>
        <div class="skeleton" style="width:100%;height:1rem;margin-bottom:.6rem"></div>
        <div class="skeleton" style="width:80%;height:1rem;margin-bottom:1.5rem"></div>
        <div class="skeleton" style="width:100%;height:52px;border-radius:10px;margin-bottom:.65rem"></div>
        <div class="skeleton" style="width:100%;height:52px;border-radius:10px;margin-bottom:.65rem"></div>
        <div class="skeleton" style="width:100%;height:52px;border-radius:10px"></div>
      </div>
    </div>
    <div id="votingPanel" class="hidden"></div>
    <div id="errorPanel" class="hidden"></div>
  </main>

  <div class="modal-backdrop hidden" id="nameModal">
    <div class="modal-box">
      <h3>Enter Your Name</h3>
      <p>This poll requires your name to participate.</p>
      <input class="modal-input" type="text" id="voterNameInput" placeholder="Your name" autocomplete="off" minlength="2" maxlength="60">
      <div class="modal-actions">
        <button class="submit-btn" id="nameSubmitBtn">Submit Vote</button>
        <button class="cancel-btn" id="nameCancelBtn">Cancel</button>
      </div>
    </div>
  </div>

  <script>
    /* ============================================================
       FINDAS POLLS - PUBLIC VOTING PAGE
       Poll management is handled exclusively via the Admin Panel.
    ============================================================ */

    const POLLS_API_KEY = window.FINDAS_POLLS_API_KEY || '851e995f-f691-4d8f-a630-5b3b83210eef';

    function resolveApiBase() {
      const origin = window.location.origin;
      const path = (window.location.pathname || '').toLowerCase();
      return path.startsWith('/findas/') ? origin + '/findas/api' : origin + '/api';
    }
    const API_BASE = resolveApiBase();

    let allPolls = [];
    let pendingVote = null;
    let selectedOptionId = null;

    function esc(str) {
      const d = document.createElement('div');
      d.textContent = String(str == null ? '' : str);
      return d.innerHTML;
    }

    function toast(msg, type) {
      type = type || 'info';
      const c = document.getElementById('toastContainer');
      const t = document.createElement('div');
      t.className = 'toast ' + type;
      t.textContent = msg;
      c.appendChild(t);
      setTimeout(function() {
        t.style.transition = 'all .3s';
        t.style.opacity = '0';
        t.style.transform = 'translateX(120%)';
        setTimeout(function() { t.remove(); }, 350);
      }, 3200);
    }

    function fmtDate(iso) {
      if (!iso) return '';
      const d = new Date(iso);
      if (isNaN(d)) return String(iso);
      return d.toLocaleString('en-US', { month: 'short', day: 'numeric', year: 'numeric', hour: '2-digit', minute: '2-digit' });
    }

    async function loadBranding() {
      try {
        const res = await fetch(API_BASE + '/site-assets', { headers: { Accept: 'application/json' } });
        const json = await res.json();
        if (!json || !json.data) return;
        var d = json.data;
        var logoUrl = d.navbar_logo_url || d.footer_logo_url || '';
        if (logoUrl) {
          var img = document.getElementById('navLogo');
          img.src = logoUrl; img.hidden = false;
        }
        if (d.brand_name) {
          document.getElementById('brandNameText').textContent = d.brand_name;
          document.title = d.brand_name + ' - Poll';
        }
        if (d.favicon_url) {
          document.getElementById('faviconLink').href = d.favicon_url;
        }
      } catch(e) {}
    }

    async function loadPolls() {
      var url = API_BASE + '/polls-api?action=getAllPolls&apiKey=' + encodeURIComponent(POLLS_API_KEY);
      var res = await fetch(url, { headers: { Accept: 'application/json' } });
      if (!res.ok) throw new Error('Server returned ' + res.status);
      var data = await res.json();
      if (!data.success || !Array.isArray(data.polls)) throw new Error('Invalid server response');
      allPolls = data.polls;
    }

    async function saveVoteToServer() {
      try {
        await fetch(API_BASE + '/polls-api', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', Accept: 'application/json' },
          body: JSON.stringify({ action: 'saveAllPolls', polls: allPolls, apiKey: POLLS_API_KEY })
        });
      } catch(e) {
        console.warn('Vote sync failed');
      }
    }

    function showError(type, title, text) {
      document.getElementById('loadingState').classList.add('hidden');
      document.getElementById('votingPanel').classList.add('hidden');
      var ep = document.getElementById('errorPanel');
      ep.classList.remove('hidden');
      var icons = { notfound: '🔍', closed: '🔒', ended: '⏰', error: '⚠️' };
      var icon = icons[type] || '⚠️';
      ep.innerHTML = '<div class="poll-card"><div class="state ' + type + '"><div class="state-icon">' + icon + '</div><div class="state-title">' + esc(title) + '</div><div class="state-text">' + esc(text) + '</div></div></div>';
    }

    function renderResults(poll, showThankYou) {
      var options = Array.isArray(poll.options) ? poll.options : [];
      var totalVotes = options.reduce(function(s,o){ return s + Number(o.votes||0); }, 0);
      var maxVotes = options.reduce(function(m,o){ return Math.max(m, Number(o.votes||0)); }, 0);
      var voters = Array.isArray(poll.voters) ? poll.voters : [];

      var thanksHtml = showThankYou ? '<div class="thank-you"><div class="thank-you-icon">🎉</div><h3>Thank You for Voting!</h3><p>Your response has been recorded.</p></div>' : '';

      var resultsHtml = options.map(function(opt) {
        var votes = Number(opt.votes || 0);
        var pct = totalVotes > 0 ? Math.round((votes / totalVotes) * 100) : 0;
        var isWinner = votes === maxVotes && votes > 0;
        return '<div class="result-option"><div class="result-label-row"><span>' + esc(opt.label) + '</span><span class="result-pct">' + pct + '% <span style="font-weight:400;color:var(--muted)">(' + votes + ')</span></span></div><div class="result-bar-wrap"><div class="result-bar-fill' + (isWinner ? ' winner' : '') + '" style="width:' + pct + '%"></div></div></div>';
      }).join('');

      var votersHtml = (poll.show_voters_publicly && voters.length > 0) ? '<div class="voters-section"><h3>Recent Voters</h3>' + voters.slice(-10).reverse().map(function(v){ return '<div class="voter-row"><span class="voter-name">' + esc(v.name||'Anonymous') + '</span><span class="voter-choice">' + esc(v.optionLabel||'-') + '</span></div>'; }).join('') + '</div>' : '';

      document.getElementById('loadingState').classList.add('hidden');
      document.getElementById('errorPanel').classList.add('hidden');
      var vp = document.getElementById('votingPanel');
      vp.classList.remove('hidden');
      var slot = vp.querySelector('[data-slot="body"]');
      if (slot) slot.innerHTML = thanksHtml + resultsHtml + '<p style="font-size:.85rem;color:var(--muted);margin-top:.75rem">Total Votes: <strong>' + totalVotes + '</strong></p>' + votersHtml;
    }

    function renderVotingOptions(poll) {
      var options = Array.isArray(poll.options) ? poll.options : [];
      var hasVoted = localStorage.getItem('voted_' + poll.id) === '1';
      if (hasVoted) { renderResults(poll, false); return; }

      var optionsHtml = options.map(function(opt) {
        return '<div class="vote-option" data-opt="' + esc(opt.id) + '" role="radio" aria-checked="false" tabindex="0"><div class="radio"></div><span class="option-text">' + esc(opt.label) + '</span></div>';
      }).join('');

      var vp = document.getElementById('votingPanel');
      var slot = vp.querySelector('[data-slot="body"]');
      slot.innerHTML = '<div class="options-list" id="optionsList" role="radiogroup">' + optionsHtml + '</div><button class="submit-btn" id="submitVoteBtn" disabled>Select an option to vote</button>';

      slot.querySelectorAll('.vote-option').forEach(function(btn) {
        btn.addEventListener('click', function() {
          slot.querySelectorAll('.vote-option').forEach(function(b){ b.classList.remove('selected'); b.setAttribute('aria-checked','false'); });
          btn.classList.add('selected');
          btn.setAttribute('aria-checked','true');
          selectedOptionId = btn.dataset.opt;
          var sb = document.getElementById('submitVoteBtn');
          sb.disabled = false;
          sb.textContent = 'Submit Vote';
        });
        btn.addEventListener('keydown', function(e){ if(e.key==='Enter'||e.key===' ') btn.click(); });
      });

      document.getElementById('submitVoteBtn').addEventListener('click', function() {
        if (!selectedOptionId) return;
        if (poll.require_name) {
          pendingVote = { pollId: poll.id, optionId: selectedOptionId };
          document.getElementById('voterNameInput').value = '';
          document.getElementById('nameModal').classList.remove('hidden');
          document.getElementById('voterNameInput').focus();
        } else {
          recordVote(poll.id, selectedOptionId, 'Anonymous');
        }
      });
    }

    async function recordVote(pollId, optionId, voterName) {
      var poll = allPolls.find(function(p){ return p.id === pollId; });
      if (!poll) return;
      var option = (poll.options||[]).find(function(o){ return o.id === optionId; });
      if (!option) return;

      option.votes = Number(option.votes || 0) + 1;
      poll.voters = Array.isArray(poll.voters) ? poll.voters : [];
      poll.voters.push({ name: voterName, optionId: optionId, optionLabel: option.label, timeISO: new Date().toISOString() });

      localStorage.setItem('voted_' + pollId, '1');
      await saveVoteToServer();
      toast('Vote recorded! Thank you!', 'success');
      renderResults(poll, true);
    }

    async function showPoll(pollId) {
      try { await loadPolls(); }
      catch(err) {
        showError('error', 'Could Not Load Poll', 'Failed to connect to the server. Please refresh the page and try again.');
        return;
      }

      var poll = allPolls.find(function(p){ return p.id === pollId; });
      if (!poll) {
        showError('notfound', 'Poll Not Found', 'This poll link appears to be invalid or has been removed. Please check the link you were given.');
        return;
      }

      var now = new Date();
      var hasEnded = poll.ends_at && new Date(poll.ends_at) < now;
      var status = String(poll.status || 'CLOSED').toUpperCase().trim();

      if (status !== 'ACTIVE') {
        showError('closed', 'Poll is ' + status.charAt(0) + status.slice(1).toLowerCase(), 'This poll is currently ' + status.toLowerCase() + '. Voting is not available at this time.');
        return;
      }
      if (hasEnded) {
        showError('ended', 'Poll Has Ended', 'This poll ended on ' + fmtDate(poll.ends_at) + '. Voting is now closed.');
        return;
      }

      var options = Array.isArray(poll.options) ? poll.options : [];
      var totalVotes = options.reduce(function(s,o){ return s + Number(o.votes||0); }, 0);
      var hasVoted = localStorage.getItem('voted_' + poll.id) === '1';

      document.getElementById('loadingState').classList.add('hidden');
      document.getElementById('errorPanel').classList.add('hidden');
      var vp = document.getElementById('votingPanel');
      vp.classList.remove('hidden');
      vp.innerHTML = '<div class="poll-card"><div class="poll-card-header"><div class="poll-eyebrow"><span class="status-badge active">Active</span></div><h1 class="poll-question">' + esc(poll.question) + '</h1><div class="poll-meta"><span>🗳️ ' + totalVotes + ' vote' + (totalVotes !== 1 ? 's' : '') + '</span>' + (poll.ends_at ? '<span>⏰ Ends ' + esc(fmtDate(poll.ends_at)) + '</span>' : '') + (poll.require_name ? '<span>👤 Name required</span>' : '') + '</div></div><div class="poll-card-body">' + (hasVoted ? '<div class="already-voted-banner"><span>✓</span> You have already voted on this poll.</div>' : '') + '<div data-slot="body"></div></div></div>';

      if (hasVoted) { renderResults(poll, false); }
      else { renderVotingOptions(poll); }
    }

    function showWelcome() {
      document.getElementById('loadingState').classList.add('hidden');
      var ep = document.getElementById('errorPanel');
      ep.classList.remove('hidden');
      ep.innerHTML = '<div class="poll-card"><div class="state"><div class="state-icon">🗳️</div><div class="state-title">Welcome to Findas Polls</div><div class="state-text">Use the voting link shared with you to participate in a poll.</div></div></div>';
    }

    document.getElementById('nameSubmitBtn').addEventListener('click', function() {
      var name = document.getElementById('voterNameInput').value.trim();
      if (name.length < 2) { toast('Please enter at least 2 characters', 'warning'); return; }
      if (!pendingVote) return;
      document.getElementById('nameModal').classList.add('hidden');
      recordVote(pendingVote.pollId, pendingVote.optionId, name);
      pendingVote = null;
    });
    document.getElementById('nameCancelBtn').addEventListener('click', function() {
      document.getElementById('nameModal').classList.add('hidden');
      pendingVote = null;
    });
    document.getElementById('voterNameInput').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') document.getElementById('nameSubmitBtn').click();
    });

    async function handleRoute() {
      var hash = window.location.hash || '';
      selectedOptionId = null;
      pendingVote = null;
      if (hash.startsWith('#/vote/')) {
        var pollId = decodeURIComponent(hash.replace('#/vote/', '').split('?')[0].trim());
        if (pollId) { await showPoll(pollId); }
        else { showWelcome(); }
      } else {
        showWelcome();
      }
    }

    document.addEventListener('DOMContentLoaded', function() {
      loadBranding();
      handleRoute();
    });
    window.addEventListener('hashchange', handleRoute);
  </script>
</body>
</html>
