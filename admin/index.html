<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Findas Admin Panel</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./css/style.css">
</head>
<body>
  <div class="admin-layout" id="adminLayout">
    <aside class="sidebar">
      <div class="brand">Findas Admin</div>
      <nav id="menuList">
        <button data-section="dashboard" class="active">Dashboard</button>
        <button data-section="hero">Hero Section</button>
        <button data-section="about">About Section</button>
        <button data-section="contact">Contact Section</button>
        <button data-section="site-config">Footer & Social Settings</button>
        <button data-section="courses">Courses</button>
        <button data-section="webinars">Webinars</button>
        <button data-section="digital-products">Digital Products</button>
        <button data-section="gallery-images">Gallery Update</button>
        <button data-section="short-reviews">Short Reviews Update</button>
        <button data-section="featured-reviews">Long Reviews Update</button>
        <button data-section="membership">Membership</button>
        <button data-section="academy-sections">Academy Sections</button>
        <button data-section="academy-community">Academy Community</button>
        <button data-section="polls">Polls</button>
        <button data-section="data-cleanup">📊 Data Cleanup</button>
        <button data-section="monitoring">📈 Monitoring</button>
        <button data-section="admin-users" data-role="owner">Admin Users</button>
      </nav>
    </aside>
    <main class="content">
      <header class="topbar">
        <h1 id="sectionTitle">Dashboard</h1>
        <div class="topbar-actions">
          <div id="currentUserBadge" class="current-user">Signed out</div>
          <button id="logoutBtn">Logout</button>
        </div>
      </header>
      <section id="panelBody" class="panel-body"></section>
    </main>
  </div>

  <div class="login-overlay" id="loginOverlay">
    <form class="login-card" id="loginForm">
      <div class="login-brand">
        <img src="https://storage.files-vault.com/uploads/1771482761-H0bNoWSgQU.jpg" alt="Findas Logo" class="login-logo">
        <p>Findas Academy</p>
      </div>
      <h2>Admin Login</h2>
      <label>Email<input type="email" id="email" placeholder="Enter your admin email" required></label>
      <label>Password<input type="password" id="password" placeholder="Enter your password" required></label>
      <button type="submit" id="loginSubmitBtn"><span class="btn-text">Sign In</span></button>
      <p id="loginError"></p>
    </form>
  </div>

  <script src="./js/app.js?v=20260324-1"></script>
</body>
</html>
